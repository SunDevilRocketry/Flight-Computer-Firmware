name: Requirement Traceability
run-name: ${{ github.actor }} is checking requirement traceability 📋
on:
  pull_request:
  push:
    branches:
      - main
      - development/**
      - personal/ES/**
      - integration/**
permissions:
  contents: read
jobs:
  trace:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run requirement tracer
        run: python reqs/req_tracer.py reqs/appa-srd/.doorstop.yml

      - name: Upload traceability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: req-traceability-report
          path: req_traceability_report.html
