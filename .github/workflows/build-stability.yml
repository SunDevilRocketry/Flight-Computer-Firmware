name: FCF Stability Check
run-name: ${{ github.actor }} is verifying build stability 🚀

on:
  pull_request:
    branches:
      - main
      - development/**
      - personal/ES/**
      - integration/**
  push:
    branches:
      - main
      - development/**
      - personal/ES/**
      - integration/**

# Prevent duplicate runs on the same commit (push + PR)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Check-build-stability:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !github.event.pull_request)

    runs-on: ubuntu-latest

    steps:
      - name: Exit neutrally if this run was canceled by concurrency
        if: ${{ github.run_attempt > 1 }}
        run: |
          echo "⚠️ This run was superseded by a newer one (push + PR concurrency). Exiting neutrally."
          exit 78

      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }}."

      - name: Check out dependencies
        uses: fiam/arm-none-eabi-gcc@v1
        with:
          release: '9-2019-q4'

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Show concurrency group
        run: echo "Group = ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}"

      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."

      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

      - name: Build APPA application (with debug flag)
        run: |
          cd app/flight/appa/rev2
          make clean
          make

      - name: Build APPA application (with release flag)
        run: |
          cd app/flight/appa/rev2
          make clean
          make DEBUG=0

      - run: echo "🍏 This job's status is ${{ job.status }}."