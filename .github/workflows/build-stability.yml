name: FCF Stability Check
run-name: ${{ github.actor }} is verifying build stability 🚀

on:
  pull_request:
    branches:
      - main
      - development/**
      - personal/ES/**
      - integration/**
  push:
    branches:
      - main
      - development/**
      - personal/ES/**
      - integration/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Check-build-stability:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.event.pull_request == null)
    runs-on: ubuntu-latest

    steps:
      - name: Check for concurrency skip
        run: |
          if [ -f /tmp/build_stability_lock ]; then
            echo "🟡 Skipping due to concurrency lock"
            exit 78
          else
            echo "Locking build..."
            touch /tmp/build_stability_lock
          fi

      - name: Check out dependencies
        uses: fiam/arm-none-eabi-gcc@v1
        with:
          release: '9-2019-q4'

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Build APPA (debug)
        run: |
          cd app/flight/appa/rev2
          make clean
          make

      - name: Build APPA (release)
        run: |
          cd app/flight/appa/rev2
          make clean
          make DEBUG=0

      - name: Cleanup concurrency lock
        if: always()
        run: rm -f /tmp/build_stability_lock
