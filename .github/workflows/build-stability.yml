name: FCF Stability Check

on:
  push:
    branches:
      - development/appa
  workflow_dispatch:

concurrency:
  group: fcf-stability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-concurrency-cancel:
    runs-on: ubuntu-latest
    outputs:
      cancelled: ${{ steps.check.outputs.cancelled }}
    steps:
      - name: Check if this workflow was cancelled due to concurrency
        id: check
        run: |
          echo "Checking if workflow is cancelled due to concurrency..."

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "Triggered from another workflow, skipping..."
            echo "cancelled=true" >> $GITHUB_OUTPUT
            exit 78
          fi

          # If job name includes 'cancel', treat as cancelled
          if [[ "${{ github.job }}" == *"cancel"* ]]; then
            echo "This job was likely cancelled due to concurrency."
            echo "cancelled=true" >> $GITHUB_OUTPUT
            exit 78
          fi

          echo "cancelled=false" >> $GITHUB_OUTPUT
          echo "No concurrency cancellation detected."

  check-build-stability:
    needs: check-concurrency-cancel
    if: needs.check-concurrency-cancel.outputs.cancelled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run Stability Checks
        run: |
          echo "Running stability check..."
          # Replace with actual test commands
          echo "✅ All stability tests passed."

  # Your other jobs below this line...
  appa-test-runner:
    needs: check-concurrency-cancel
    if: needs.check-concurrency-cancel.outputs.cancelled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run APPA Tests
        run: |
          echo "Running APPA tests..."

  codeql-analysis:
    needs: check-concurrency-cancel
    if: needs.check-concurrency-cancel.outputs.cancelled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run CodeQL
        run: |
          echo "Running CodeQL analysis..."
