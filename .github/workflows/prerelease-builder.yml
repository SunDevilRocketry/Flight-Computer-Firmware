name: FCF Prerelease Build (CD)
run-name: ${{ github.actor }} is building a new prerelease 📦
permissions:
  contents: read
on: 
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Continuous'
        type: choice
        options:
          - Continuous
          - RC
  schedule:
    - cron: '0 12 * * FRI'
env:
  BASE_VERSION: v2.7.0  # <-- Change this when you bump the base version

jobs:
  build-prerelease:
    name: Build Prerelease Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        debug_mode: [debug, release]
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }}."
      - name: Check out dependencies
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1' # <-- The compiler release to use
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - name: Build APPA application (with debug flag)
        run: |    
          cd app/rev2
          make clean
          if [ "${{ matrix.debug_mode }}" = "debug" ]; then
            make DEBUG=1
          else
            make DEBUG=0
          fi
          mv build/appa.bin build/appa-${{ matrix.debug_mode }}.bin
      - name: Save Prerelease
        uses: actions/upload-artifact@v6
        id: promote-results
        with:
          name: prerelease-binary-${{ matrix.debug_mode }}
          path: ${{ github.workspace }}/app/rev2/build/appa-${{ matrix.debug_mode }}.bin
      - name: Output artifact ID
        run: echo 'Artifact ID is ${{ steps.promote-results.outputs.artifact-id }}'
      - run: echo "🍏 This job's status is ${{ job.status }}."

  build-emulator-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }}."
      - name: Check out dependencies
        uses: cygwin/cygwin-install-action@v1
        with:
          packages: > # Specify a space-separated list of additional packages
            make
            gcc-core
            git
      - name: Allow all safe directories (fix cygwin git conflict)
        run: git config --global --add safe.directory '*'
        shell: powershell
      - name: Prefer Git for Windows (fix cygwin git conflict)
        shell: powershell
        run: |
            $gitPath = "C:\Program Files\Git\bin"
            $currentPath = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
            # Prepend Git for Windows so it wins over Cygwin
            echo "$gitPath;$env:PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - name: Build emulator
        run: |    
          cd app/rev2
          make clean
          make -j4 emulator
          mv build/appa.exe build/appa-emulator.exe
      - name: Save Prerelease
        uses: actions/upload-artifact@v4
        id: promote-results
        with:
          name: prerelease-binary-emulator
          path: ${{ github.workspace }}/app/rev2/build/appa-emulator.exe
      - name: Output artifact ID
        run: echo 'Artifact ID is ${{ steps.promote-results.outputs.artifact-id }}'
      - run: echo "🍏 This job's status is ${{ job.status }}."

  
  create-prerelease:
    name: Create GitHub Prerelease
    runs-on: ubuntu-latest
    needs: [build-prerelease, build-emulator-windows]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest prerelease tag
        id: get_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_VERSION: ${{ env.BASE_VERSION }}
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # RELEASE CANDIDATES
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$BUILD_TYPE" = "RC" ]; then
            rc_tags=$(gh release list --limit 100 --json tagName --jq '.[] | .tagName' | grep "^${BASE_VERSION}-RC" || true)

            echo "Existing RC tags:"
            echo "$rc_tags"

            max_rc=$(echo "$rc_tags" | sed -E "s/^${BASE_VERSION}-RC([0-9]+)/\1/" | sort -n | tail -1)
            if [ -z "$max_rc" ]; then
              next_rc=1
            else
              next_rc=$((10#$max_rc + 1))
            fi

            new_tag="${BASE_VERSION}-RC${next_rc}"
          # CONTINUOUS
          else
            # Get all tags starting with base version (e.g., v2.6.0-###)
            tags=$(gh release list --limit 100 --json tagName --jq '.[] | .tagName' | grep -E "^${BASE_VERSION}-[0-9]+" || true)

            echo "Existing tags:"
            echo "$tags"

            # Extract numeric suffixes and find the max
            max_num=$(echo "$tags" | sed -E "s/^${BASE_VERSION}-([0-9]+)/\1/" | sort -n | tail -1)
            if [ -z "$max_num" ]; then
              next_num=1
            else
              next_num=$((10#$max_num + 1))
            fi

            new_tag=$(printf "%s-%03d" "$BASE_VERSION" "$next_num")
          fi

          echo "Next tag: $new_tag"
          echo "tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: prerelease-artifacts

      - name: Create prerelease on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"

          gh release create "${{ steps.get_tag.outputs.tag }}" --prerelease --title "${{ steps.get_tag.outputs.tag }}" --notes "Prerelease build triggered by ${{ github.actor }}"

          echo "Uploading binaries to $TAG..."

          emulator_bin=$(find prerelease-artifacts -type f -name "*.exe" | head -1)
          if [ -n "$emulator_bin" ]; then
            echo "Uploading $emulator_bin as appa-emulator.exe"
            gh release upload "$TAG" "$emulator_bin#appa-emulator.exe" --clobber
          fi
          
          for f in $(find prerelease-artifacts -type f -name "*.bin"); do
            folder=$(basename $(dirname "$f"))   # e.g., prerelease-binary-debug
            base=$(basename "$f")                # e.g., appa.bin

            # Determine new name based on folder
            if [[ "$folder" == *debug* ]]; then
              asset_name="appa-debug.bin"
            else
              asset_name="appa-release.bin"
            fi

            echo "Uploading $f as $asset_name"
            gh release upload "$TAG" "$f" --clobber
          done
